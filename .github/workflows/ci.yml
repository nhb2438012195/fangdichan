name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Backend Checks
        run: |
          cd fangdichan-server
          mvn validate -q
          mvn test -q

  admin-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fangdichan-admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fangdichan-admin-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fangdichan-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fangdichan-client/package-lock.json
      - run: npm ci
      - run: npm test
